<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة المستخدمين - جامعة السلام الدولية</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link rel="stylesheet" href="salam.css">

    <style>
        .hero {
            position: relative;
            min-height: 100vh;
            padding: 28px 14px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            background: radial-gradient(circle at top, #0b1120 0%, #020617 55%, #000 100%);
            overflow-y: auto;  
        }

        .manage-shell {
            width: 100%;
            max-width: 1000px;
            z-index: 2;
        }

        .manage-header {
            text-align: center;
            margin-bottom: 20px;
            color: #E5F0FF;
        }

        .manage-header h1 {
            margin: 0 0 6px;
            font-size: 1.8rem;
            font-weight: 800;
        }

        .manage-card {
            background: rgba(15,23,42,0.92);
            border-radius: 18px;
            padding: 22px;
            border: 1px solid rgba(148,163,184,0.4);
            box-shadow: 0 18px 45px rgba(15,23,42,0.9);
            backdrop-filter: blur(12px);
            color: #E5F0FF;
        }

        /* مؤشر التحميل الحقيقي */
        .loading-status {
            text-align: center;
            padding: 12px;
            margin-bottom: 18px;
            border-radius: 8px;
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
            font-weight: bold;
            font-size: 0.95rem;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        /* نموذج إضافة مستخدم */
        .user-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)) auto;
            gap: 12px;
            background: rgba(30, 41, 59, 0.5);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(148,163,184,0.15);
            margin-bottom: 24px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 0.85rem;
            color: #9CA3AF;
            font-weight: 600;
        }

        .form-group input, .form-group select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(148,163,184,0.4);
            background: #0f172a;
            color: #fff;
            font-size: 0.9rem;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #38bdf8;
            outline: none;
        }

        .btn-add {
            padding: 10px 24px;
            border-radius: 8px;
            border: none;
            background: #10b981;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            height: 42px;
        }
        .btn-add:hover { background: #059669; }

        /* جدول العرض المتوافق مع الشيت */
        .table-responsive {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid rgba(148,163,184,0.2);
            background: #0f172a;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
            font-size: 0.92rem;
        }

        th, td {
            padding: 14px 12px;
            border-bottom: 1px solid rgba(148,163,184,0.15);
        }

        th {
            background: #1e293b;
            color: #38bdf8;
            font-weight: 700;
        }

        tr:hover td {
            background: rgba(255,255,255,0.03);
        }

        .role-select-cell {
            padding: 6px 10px;
            border-radius: 6px;
            background: #1e293b;
            color: #fff;
            border: 1px solid rgba(148,163,184,0.3);
            font-size: 0.85rem;
        }

        .btn-delete {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            background: #ef4444;
            color: #fff;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .btn-delete:hover { background: #dc2626; }

        .btn-back {
            display: inline-block;
            margin-top: 18px;
            padding: 8px 18px;
            border-radius: 999px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(148,163,184,0.3);
            color: #E5F0FF;
            text-decoration: none;
            font-size: 0.88rem;
        }
        .btn-back:hover {
            border-color: #38bdf8;
            background: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<div class="hero">
    <div class="manage-shell">
        
        <div class="manage-header">
            <h1>لوحة إدارة مستخدمي المنظومة</h1>
            <p>سحب وعرض وتعديل الحسابات الحية للموظفين </p>
        </div>

        <div class="manage-card">
            
            <div id="loadingStatus" class="loading-status">🔄 جاري الاتصال بـ وجلب حسابات الموظفين الحالية...</div>

            <form id="userForm" class="user-form" onsubmit="addUser(event)">
                <div class="form-group">
                    <label>اسم المستخدم (username)</label>
                    <input type="text" id="username" placeholder="مثال: أحمد امبارك" required>
                </div>
                <div class="form-group">
                    <label>كلمة المرور (password)</label>
                    <input type="text" id="password" placeholder="اكتب كلمة المرور هنا" required>
                </div>
                <div class="form-group">
                    <label>الصلاحية (role)</label>
                    <select id="userRole">
                        <option value="user1">user1 (منسق كلية)</option>
                        <option value="user2">user2 (موظف تسجيل)</option>
                        <option value="user3">user3 (موظف تقارير)</option>
                        <option value="admin">admin (مدير النظام)</option>
                        <option value="admin1">admin1 (الإدارة العليا)</option>
                    </select>
                </div>
                <button type="submit" class="btn-add" id="submitBtn">+ إضافة مستخدم جديد للمنظومة</button>
            </form>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>اسم المستخدم (username)</th>
                            <th>كلمة المرور (password)</th>
                            <th>رمز الصلاحية (role)</th>
                            <th>تعديل سريع للصلاحية</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                    </tbody>
                </table>
            </div>

            <a href="dashboard.html" class="btn-back">🡪 العودة للوحة التحكم</a>

        </div>
    </div>
</div>

<script>
   // 🔗 رابط الـ Web App الفعلي الخاص بك
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwgmunZv-wU-kBJqP6cbVk-A1sqoWd9TYqesW7FS0CWz5XRejQ23hOJ0QqpTwpjI0X8kQ/exec"; 
    
    // 🔒 مفتاح الأمان المطابق للـ API لمنع التلاعب بالبيانات خارجيًا
    const SECURITY_TOKEN = "AIU_SECURE_2026"; 
                        
    // تأمين الصفحة لـ admin1 فقط
    const currentRole = (localStorage.getItem("aiu_role") || "").toLowerCase();
    if (currentRole !== "admin1") {
        alert("تنبيه أمني: لا تملك الصلاحية لدخول قاعدة بيانات المستخدمين.");
        window.location.href = "dashboard.html";
    }

    let globalUsersList = [];

    function showStatus(msg) {
        const status = document.getElementById("loadingStatus");
        status.style.display = "block";
        status.innerText = msg;
    }

    function hideStatus() {
        document.getElementById("loadingStatus").style.display = "none";
    }

    // 1️⃣ دالة جلب البيانات التلقائية عند فتح الصفحة
    async function fetchUsersFromSheet() {
        showStatus("🔄 جاري جلب بيانات الحسابات للموظفين  ...");
        try {
            const response = await fetch(`${SCRIPT_URL}?action=read`);
            const data = await response.json();
            
            globalUsersList = data;
            renderUsers();
            hideStatus();
        } catch (error) {
            console.error("Error fetching data:", error);
            showStatus("❌ فشل جلب البيانات تلقائياً.");
            
            const fallback = localStorage.getItem("aiu_users_list");
            if (fallback) {
                globalUsersList = JSON.parse(fallback);
                renderUsers();
            }
        }
    }

    // 2️⃣ دالة بناء الجدول وتحويل الحقول إلى صناديق قابلة للتعديل والتحرير الحقيقي
    function renderUsers() {
        const tbody = document.getElementById("usersTableBody");
        tbody.innerHTML = ""; 

        if (globalUsersList.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #9CA3AF; padding: 20px;">لا توجد بيانات مستخدمين حالياً في الشيت.</td></tr>`;
            return;
        }

        globalUsersList.forEach((user, index) => {
            const username = user.username || user["اسم المستخدم"] || "";
            const password = user.password || user["كلمة المرور"] || "";
            const role = user.role || user["الصلاحية"] || "user1";

            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>
                    <input type="text" id="edit_user_${index}" value="${username}" readonly style="background:transparent; border:none; color:#fff; width:140px; font-weight:bold;">
                </td>
                <td>
                    <input type="text" id="edit_pass_${index}" value="${password}" style="background:#1e293b; border:1px solid rgba(148,163,184,0.3); color:#38bdf8; padding:4px 8px; border-radius:6px; width:130px;">
                </td>
                <td>
                    <span style="color: #f4c46a; font-size:0.85rem;">${role}</span>
                </td>
                <td>
                    <select class="role-select-cell" id="edit_role_${index}">
                        <option value="user1" ${role === 'user1' ? 'selected' : ''}>user1 (منسق)</option>
                        <option value="user2" ${role === 'user2' ? 'selected' : ''}>user2 (تسجيل)</option>
                        <option value="user3" ${role === 'user3' ? 'selected' : ''}>user3 (تقارير)</option>
                        <option value="admin" ${role === 'admin' ? 'selected' : ''}>admin (مدير)</option>
                        <option value="admin1" ${role === 'admin1' ? 'selected' : ''}>admin1 (عليا)</option>
                    </select>
                </td>
                <td>
                    <button class="btn-add" style="height:auto; padding:6px 12px; font-size:0.85rem; margin-left:4px;" onclick="saveUserRowChanges(${index})">حفظ 💾</button>
                    <button class="btn-delete" onclick="deleteUserFromSheet(${index})">حذف</button>
                </td>
            `;
            tbody.appendChild(tr);
        });

        localStorage.setItem("aiu_users_list", JSON.stringify(globalUsersList));
    }

    // 3️⃣ دالة إضافة مستخدم جديد
    async function addUser(e) {
        e.preventDefault();
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const role = document.getElementById("userRole").value;

        showStatus("⏳ جاري إضافة الحساب الجديد إلى الـ Google Sheet أونلاين...");

        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action: "insert", username, password, role, token: SECURITY_TOKEN })
            });

            globalUsersList.push({ username, password, role });
            renderUsers();
            
            document.getElementById("username").value = "";
            document.getElementById("password").value = "";
            alert(`تمت إضافة (${username}) بنجاح إلى شيت جوجل!`);
        } catch (error) {
            alert("حدث خطأ أثناء الاتصال بالـ API.");
            console.error(error);
        } finally {
            hideStatus();
            setTimeout(fetchUsersFromSheet, 1200);
        }
    }

    // 4️⃣ دالة حفظ التعديلات الشاملة (تعديل كلمة المرور أو الصلاحية) بناءً على اسم المستخدم الثابت كـ Key
    async function saveUserRowChanges(index) {
        const username = document.getElementById(`edit_user_${index}`).value.trim();
        const newPassword = document.getElementById(`edit_pass_${index}`).value.trim();
        const newRole = document.getElementById(`edit_role_${index}`).value;
        
        showStatus(`⏳ جاري تحديث بيانات الحساب (${username}) في الشيت...`);

        try {
            // سنرسل الطلب للـ API ليقوم بالتحديث الآمن داخل سطر المستخدم في السكريبت الرئيسي
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ 
                    action: "update", 
                    username: username, 
                    password: newPassword, // إرسال كلمة المرور الجديدة إن وجدت للتحديث
                    role: newRole, 
                    token: SECURITY_TOKEN 
                })
            });
            
            // تحديث محلي في الكاش والواجهة
            globalUsersList[index].password = newPassword;
            globalUsersList[index].role = newRole;
            renderUsers();
            alert(`تم تحديث بيانات الحساب (${username}) بنجاح!`);
        } catch (error) {
            alert("حدث خطأ أثناء حفظ التعديلات.");
            console.error(error);
        } finally {
            hideStatus();
            setTimeout(fetchUsersFromSheet, 1000); // تحديث شامل للتأكيد
        }
    }

    // 5️⃣ دالة حذف المستخدم من الشيت أونلاين نهائياً
    async function deleteUserFromSheet(index) {
        const username = document.getElementById(`edit_user_${index}`).value.trim();
        
        if (!confirm(`هل أنت متأكد من حذف الحساب (${username}) نهائياً من الـ Google Sheet؟`)) return;

        showStatus(`⏳ جاري حذف الحساب من الـ Google Sheet...`);

        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ action: "delete", username: username, token: SECURITY_TOKEN })
            });
            
            globalUsersList.splice(index, 1);
            renderUsers();
        } catch (error) {
            console.error(error);
        } finally {
            hideStatus();
        }
    }

    // التشغيل التلقائي الفوري بمجرد فتح الصفحة
    fetchUsersFromSheet();
</script>

</body>
</html>
